<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Интерактивный диктант — расширение для Genially</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:700,400&display=swap" rel="stylesheet">
  <style>
    :root { --game-bg: #f4f6fc; }
    body {
      background: var(--game-bg);
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      min-height: 100vh;
    }
    #game-root {
      margin-top: 50px;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }
    .tasks {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }
    .task-tile {
      background: #fff;
      box-shadow: 0 3px 8px #0001;
      border-radius: 14px;
      padding: 16px;
      width: 180px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: 0.2s;
    }
    .task-tile.done {
      opacity: 0.5;
    }
    .task-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,128,64,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #fff;
      font-weight: 700;
      border-radius: 14px;
    }
    .lang-btn, .mode-btn {
      padding: 11px 25px;
      margin: 10px 10px 18px 0;
      border-radius: 9px;
      background: #eaf;
      cursor: pointer;
      border: none;
      font-size: 16px;
      font-weight: 600;
      color: #2b2952;
      transition: 0.2s;
    }
    .lang-btn.active, .mode-btn.active {
      background: #7af;
      color: #fff;
    }
    .dd-letter-bank { min-height:48px;margin-bottom:13px;}
    .dd-letter {
      display:inline-block;
      font-size:23px;
      background:#def;
      border-radius:7px;
      padding:6px 13px;
      margin-right:7px;
      margin-bottom:7px;
      cursor:grab;
      transition:.11s;
      border:1.5px solid #a9c8e6;
      user-select: none;
      position: relative;
      z-index: 1;
    }
    .dd-letter.dragging {
      opacity: 0.18 !important;
    }
    .dd-slot-box { 
      min-height:52px;
      background: #eaf2f4;
      border-radius:8px;
      display: flex;
      justify-content: center;
      padding: 6px;
      gap: 5px;
      margin-bottom:10px;
      border:2px dashed #a9c8e6;
      flex-wrap: wrap;
      position:relative;
    }
    .dd-slot {
      width:35px;height:35px;display:inline-flex;align-items:center;justify-content:center;
      background: #fff;
      border:1.4px solid #dfdbe7;
      border-radius:7px;
      font-size:21px;
      margin:2px;
      transition:.1s;
      position:relative;
      box-sizing:border-box;
      z-index:0;
    }
    .manual-scale { 
      display: flex; gap: 10px; justify-content: center; align-items:center; margin:22px auto 10px;
    }
    .scale-dot {
      width: 33px; height: 33px; border-radius: 50%; background: #eef; border:2px solid #7af;
      cursor: pointer; transition:.13s;box-sizing:border-box;box-shadow:0 1px 8px #7af4;
      display: flex; align-items:center; justify-content:center;
      font-size:21px; font-weight:700;color:#fff;
    }
    .scale-dot.active { background:#7af; color:#fff; border:2px solid #378cfc;}
    #dnd-float-letter {
      pointer-events:none;
      position:fixed;
      z-index:9999;
      left:0;top:0;
      display: none;
    }
    @media (max-width: 700px) {
      #game-root { max-width: 99vw; }
      .task-tile { width: 95vw; max-width: 99vw; margin-bottom: 14px;}
    }
  </style>
</head>
<body>
<div id="game-root"></div>
<script>
const gameSettings = {
    background: "#f4f6fc"
};
const tasksets = {
  ru: [
    { img: "https://cdn.pixabay.com/photo/2017/01/20/15/06/apple-1995056_1280.png", definition: "Красный фрукт, падает с дерева", answer: "яблоко", done: false },
    { img: "https://cdn.pixabay.com/photo/2012/04/13/20/24/dog-33613_1280.png", definition: "Четвероногий домашний друг человека", answer: "собака", done: false }
  ],
  en: [
    { img: "https://cdn.pixabay.com/photo/2017/01/20/15/06/apple-1995056_1280.png", definition: "A red fruit that falls from a tree", answer: "apple", done: false },
    { img: "https://cdn.pixabay.com/photo/2012/04/13/20/24/dog-33613_1280.png", definition: "A four-legged animal that barks", answer: "dog", done: false }
  ]
};
const feedback = {
  ru: ["Молодец!","Верно!","Здорово!","Вот это да!"],
  en: ["Well done!","Correct!","Great job!","Awesome!"]
};
let userLang = null;
let tasks = [];
let gameMode = null;
let manualScale = [];
document.body.style.setProperty('--game-bg', gameSettings.background);

function renderStart() {
  document.getElementById('game-root').innerHTML = `
    <div style="text-align:center; margin-top:20px;">
      <h2>Интерактивный диктант</h2>
      <div>
        <button class="lang-btn" onclick="chooseLang('ru')">Русский</button>
        <button class="lang-btn" onclick="chooseLang('en')">English</button>
      </div>
      <div style="margin-top:30px;">
        <button class="mode-btn" onclick="chooseMode('order')" disabled>Составить слово из букв (просто)</button>
        <button class="mode-btn" onclick="chooseMode('input')" disabled>Печатать слово (сложно)</button>
      </div>
    </div>`;
  window.chooseLang = function(lang){
    userLang = lang;
    tasks = tasksets[lang].map(x=>({...x, done:false}));
    manualScale = Array(tasks.length).fill(false);
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    document.querySelectorAll('.mode-btn').forEach(btn => btn.disabled = false);
  }
  window.chooseMode = function(mode){
    gameMode = mode;
    renderMain();
  }
}
renderStart();

function renderMain() {
  let root = document.getElementById('game-root');
  root.innerHTML = `
    <div style="margin:25px 0 14px 5px;">
      <button class="lang-btn ${userLang==='ru'?'active':''}" onclick="switchLang('ru')">RU</button>
      <button class="lang-btn ${userLang==='en'?'active':''}" onclick="switchLang('en')">EN</button>
      <span style="margin-left:22px;"></span>
      <button class="mode-btn ${gameMode==='order'?'active':''}" onclick="switchMode('order')">${userLang==='ru'?'Буквы':'Order letters'}</button>
      <button class="mode-btn ${gameMode==='input'?'active':''}" onclick="switchMode('input')">${userLang==='ru'?'Печатать':'Type word'}</button>
    </div>
    <div class="tasks">
      ${tasks.map((t,i)=>`
        <div class="task-tile${t.done?' done':''}" onclick="openTask(${i})">
          <img src="${t.img}" style="width:90px;height:90px;object-fit:contain;" />
          <div style="margin:8px 0 5px;font-weight:600;">${i+1}</div>
          <div style="min-height:32px;color:#555">${t.definition}</div>
          ${t.done ? `<div class="task-overlay"><span>✔</span></div>` : ''}
        </div>
      `).join('')}
    </div>
    <div id="final-screen"></div>
  `;
  checkWin();
  window.switchLang = function(lang) {
    if(userLang !== lang) {
      userLang = lang;
      tasks = tasksets[lang].map(x=>({...x,done:false}));
      manualScale = Array(tasks.length).fill(false);
      renderMain();
    }
  }
  window.switchMode = function(mode){
    if(gameMode !== mode){
      gameMode = mode; renderMain();
    }
  }
}

function openTask(ix){
  if(tasks[ix].done) return;
  let t = tasks[ix];
  let root = document.getElementById('game-root');
  root.innerHTML = `
    <div style="padding:30px;text-align:center;">
      <img src="${t.img}" style="width:120px;height:120px;object-fit:contain;"/>
      <div style="margin:15px 0 25px 0; font-size:18px;">${t.definition}</div>
      <div id="answer-area"></div>
      <div id="feedback-area"></div>
      <br><br>
      <button onclick="renderMain()">${userLang==='ru'?'Назад':'Back'}</button>
      <div id="dnd-float-letter"></div>
    </div>
  `;
  if(gameMode === 'order') renderOrderTask(ix);
  else renderInputTask(ix);
}

// ================= Drag&Drop ==================
let dndState = {};
let activeIxForDND = null;

function renderOrderTask(ix){
  let t = tasks[ix];
  let answer = t.answer;
  if(!dndState[ix]) {
    let letters = answer.split('').map((ch, i) => ({ch, id: i + '_' + Math.random().toString(36).substr(2,6)}));
    dndState[ix] = {
      bank: [...letters],
      slots: Array(letters.length).fill(null),
      draggingId: null,
      dragOffset: {x:0, y:0},
      dragPos: {x:-1000, y:-1000},
      dragHoverSlot: null
    };
  }
  let state = dndState[ix];

  let slotHTML = state.slots.map((obj, i) =>
    `<div class="dd-slot"
      data-slot="${i}"
      style="border:${state.dragHoverSlot===i ? '2px solid #7af':'1.4px solid #dfdbe7'};
      background:${state.dragHoverSlot===i ? '#defc':'#fff'}"
    >${obj ? `<span>${obj.ch}</span>` : ""}</div>`
  ).join('');
  let bankHTML = state.bank.map((obj, k) =>
    `<span class="dd-letter" 
       onmousedown="dndStart(event, '${obj.id}', ${ix})"
       ontouchstart="dndStart(event, '${obj.id}', ${ix})"
       id="bank-${obj.id}"
    >${obj.ch}</span>`
  ).join('');
  document.getElementById('answer-area').innerHTML = `
    <div style="margin-bottom:10px;">${userLang==='ru'?'Соберите слово:':'Build the word:'}</div>
    <div class="dd-slot-box" id="drop-slot-box" style="position:relative;">
      ${slotHTML}
    </div>
    <div class="dd-letter-bank" id="letter-bank">${bankHTML}</div>
    <button onclick="undoLast(${ix})" style="margin-top:7px;" ${state.slots.every(s=>!s)?'disabled':''}>↩ Undo</button>
    <div style="margin:8px;font-size:12px;color:#888;">
      ${userLang==='ru'?'Перетащите букву мышью или пальцем в нужную ячейку':'Drag and drop letter into slot'}
    </div>
    <div id="dnd-float-letter" style="display:none;"></div>
  `;

  // floating letter
  if(state.draggingId) {
    let obj = state.bank.find(o=>o.id===state.draggingId);
    const floatDiv = document.getElementById('dnd-float-letter');
    if(obj){
      floatDiv.style.display = 'block';
      floatDiv.style.position = 'fixed';
      floatDiv.style.zIndex = 9999;
      floatDiv.style.pointerEvents = 'none';
      floatDiv.style.left = (state.dragPos.x-state.dragOffset.x)+'px';
      floatDiv.style.top = (state.dragPos.y-state.dragOffset.y)+'px';
      floatDiv.innerHTML = `<span class="dd-letter" style="box-shadow:0 2px 20px #67abff7f; background:#b8eafd; color:#015;
        font-size:27px; padding:10px 20px; border:2px solid #48e; position:relative; opacity:.93;">
        ${obj.ch}
      </span>`;
    }
  } else {
    let floatDiv = document.getElementById('dnd-float-letter');
    if(floatDiv) floatDiv.style.display='none';
  }
}

// DND event handlers (глобально!)
function dndStart(ev, id, ix){
  activeIxForDND = ix;
  let state = dndState[ix];
  ev.preventDefault();
  const isTouch = ev.touches && ev.touches.length;
  let x = isTouch ? ev.touches[0].clientX : ev.clientX;
  let y = isTouch ? ev.touches[0].clientY : ev.clientY;
  let btn = document.getElementById('bank-'+id);
  let rect = btn.getBoundingClientRect();
  state.draggingId = id;
  state.dragOffset = { x: x - rect.left, y: y - rect.top };
  state.dragPos = {x:x, y:y};
  renderOrderTask(ix);

  window.addEventListener('mousemove', dragMoveHandler);
  window.addEventListener('touchmove', dragMoveHandler, {passive:false});
  window.addEventListener('mouseup', dragUpHandler);
  window.addEventListener('touchend', dragUpHandler, {passive:false});
}
function dragMoveHandler(e){
  let state = dndState[activeIxForDND];
  if(!state) return;
  let clientX, clientY;
  if(e.touches) {
    clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX; clientY = e.clientY;
  }
  state.dragPos = {x:clientX, y:clientY};
  let slots = Array.from(document.querySelectorAll('.dd-slot'));
  let over = null;
  for(let i=0;i<slots.length;i++){
    let r = slots[i].getBoundingClientRect();
    if(clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom){
      over = i; break;
    }
  }
  state.dragHoverSlot = over;
  renderOrderTask(activeIxForDND);
}
function dragUpHandler(e){
  let state = dndState[activeIxForDND];
  if(!state) return;
  let clientX, clientY;
  if(e.changedTouches) {
    clientX = e.changedTouches[0].clientX; clientY = e.changedTouches[0].clientY;
  } else {
    clientX = e.clientX; clientY = e.clientY;
  }
  let dropped = null;
  let slots = Array.from(document.querySelectorAll('.dd-slot'));
  for(let i=0;i<slots.length;i++){
    let r = slots[i].getBoundingClientRect();
    if(clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom){
      dropped = i; break;
    }
  }
  if(typeof dropped === 'number' && !state.slots[dropped]) {
    let idx = state.bank.findIndex(obj=>obj.id===state.draggingId);
    if(idx!==-1){
      state.slots[dropped] = state.bank[idx];
      state.bank.splice(idx,1);
    }
    state.draggingId = null; state.dragHoverSlot = null;
    renderOrderTask(activeIxForDND);
    checkAnswerDND(activeIxForDND);
  } else {
    state.draggingId = null; state.dragHoverSlot = null; renderOrderTask(activeIxForDND);
  }
  window.removeEventListener('mousemove',dragMoveHandler);
  window.removeEventListener('touchmove',dragMoveHandler);
  window.removeEventListener('mouseup',dragUpHandler);
  window.removeEventListener('touchend',dragUpHandler);
}
function undoLast(ix) {
  let state = dndState[ix];
  for(let i=state.slots.length-1;i>=0;i--){
    if(state.slots[i]){
      state.bank.push(state.slots[i]);
      state.slots[i]=null;
      break;
    }
  }
  renderOrderTask(ix);
}
function checkAnswerDND(ix){
  let state = dndState[ix];
  if(state.slots.every(v=>v)){
    let answer = tasks[ix].answer;
    let userWord = state.slots.map(x=>x.ch).join('');
    if(userWord === answer) positiveResult(ix);
  }
}
// ================

function renderInputTask(ix){
  let t = tasks[ix];
  let html = `<div style="margin:12px;">${userLang==='ru'?'Введите слово:':'Type the word:'}</div>
    <input id="user-input" type="text" maxlength="${t.answer.length+2}" style="font-size:21px; padding:5px; max-width:200px; text-align:center; border-radius:6px; border:1px solid #ccc;"/>
    <br><br>
    <button onclick="checkInputAnswer(${ix})">${userLang==='ru'?'Проверить':'Check'}</button>`;
  document.getElementById('answer-area').innerHTML = html;
}
window.checkInputAnswer = function(ix){
  let val = (document.getElementById('user-input').value||'').trim().toLowerCase();
  if(val === tasks[ix].answer) positiveResult(ix);
}

function positiveResult(ix){
  tasks[ix].done = true;
  let el = document.getElementById('feedback-area');
  let msg = feedback[userLang][Math.floor(Math.random()*feedback[userLang].length)];
  el.innerHTML = `<div style="padding:25px 10px 7px;font-size:22px;color:#27684d;">${msg}<br>
    <button onclick="renderMain()" style="margin-top:17px;">${userLang==='ru'?'Вернуться':'Go back'}</button></div>`;
  setTimeout(()=>renderMain(), 1700);
}

function checkWin(){
  let root = document.getElementById('final-screen');
  if(tasks.every(t=>t.done)) {
    root.innerHTML = `
      <div style="background:#dfffd9;padding:20px 16px;border-radius:13px;font-size:19px;color:#216423;margin:17px auto 9px;max-width:420px;box-shadow:0 2px 16px #aaffccd3;">
        🎉 ${userLang==='ru'?'Поздравляем! Все задания выполнены.' : 'All done!'}
        <br>
        ${userLang==='ru'?'Отметьте самостоятельно количество правильных ответов:' : 'Mark your correct answers manually:'}
        <div class="manual-scale">${manualScale.map((v,ix)=>
          `<div class="scale-dot${v?' active':''}" onclick="markSelf(${ix})">${v?'✔':''}</div>`
        ).join('')}
        </div>
        <div style="font-size:13px;color:#27684d;">${userLang==='ru'?'Проверьте, сколько слов вы действительно решили правильно.' : 'Check how many words you really got right.'}</div>
      </div>
    `;
    if(!manualScale.some(()=>true) || manualScale.length!==tasks.length) manualScale = Array(tasks.length).fill(false);
  } else root.innerHTML = '';
}
window.markSelf = function(ix){
  manualScale[ix] = !manualScale[ix];
  checkWin();
};
</script>
</body>
</html>
